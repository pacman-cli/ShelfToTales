services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: shelftotalesdb
      POSTGRES_USER: shelftotales
      POSTGRES_PASSWORD: shelftotales_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelftotales -d shelftotalesdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass shelftotales_redis_password
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "shelftotales_redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
