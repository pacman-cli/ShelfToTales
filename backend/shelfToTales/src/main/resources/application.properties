spring.application.name=shelfToTales

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shelftotalesdb}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:shelftotales}
spring.datasource.password=${DB_PASSWORD:shelftotales_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Response Compression (gzip)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# JWT Configuration
jwt.secret-key=${JWT_SECRET_KEY:dev-only-secret-key-change-in-production-must-be-at-least-32-bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# HTTPS (disable for local dev; enable in production via env var)
app.security.require-https=${REQUIRE_HTTPS:false}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true

# Logging
logging.level.com.example.shelftotales=INFO
logging.level.org.springframework.security=WARN

# Caching (in-memory for local dev; use redis in production with proper serializer)
spring.cache.type=${CACHE_TYPE:simple}
spring.cache.cache-names=categories,books,bookById,profiles

# Actuator: expose health, info, and metrics for monitoring.
# Health probes (liveness/readiness) are enabled for container orchestrators.
# Avoid exposing the env/heapdump/etc. endpoints in production.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.git.mode=simple

# Resilience4j Circuit Breaker for Google Auth
resilience4j.circuitbreaker.instances.google.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.google.slidingWindowSize=10
resilience4j.circuitbreaker.instances.google.failureRateThreshold=50
resilience4j.circuitbreaker.instances.google.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.google.permittedNumberOfCallsInHalfOpenState=3

# Resilience4j Time Limiter for Google Auth (5 second timeout)
resilience4j.timelimiter.instances.google.timeoutDuration=5s
resilience4j.timelimiter.instances.google.cancelRunningFuture=true

# Resilience4j Retry for Google Auth (3 attempts, 500ms wait, exponential backoff)
resilience4j.retry.instances.google.maxAttempts=3
resilience4j.retry.instances.google.waitDuration=500ms
resilience4j.retry.instances.google.enableExponentialBackoff=true
resilience4j.retry.instances.google.exponentialBackoffMultiplier=2

# Resilience4j Retry for Order Checkout (2 attempts for transient DB failures)
resilience4j.retry.instances.orderCheckout.maxAttempts=2
resilience4j.retry.instances.orderCheckout.waitDuration=200ms
resilience4j.retry.instances.orderCheckout.retryExceptions=org.springframework.dao.OptimisticLockingFailureException,org.springframework.dao.TransientDataAccessException

# Redis Configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# AI Embedding (local ONNX — run scripts/download-models.sh to fetch model)
ai.embedding.model-path=classpath:models/all-MiniLM-L6-v2.onnx
ai.embedding.tokenizer-path=classpath:models/tokenizer.json

# AI Chat (none = rule-based fallback, openrouter = OpenRouter free models, openai = OpenAI API)
ai.chat.provider=${AI_CHAT_PROVIDER:openrouter}
ai.chat.api-key=${AI_CHAT_API_KEY:}
ai.chat.model=${AI_CHAT_MODEL:meta-llama/llama-3.1-8b-instruct:free}
ai.chat.base-url=${AI_CHAT_BASE_URL:https://openrouter.ai/api/v1/chat/completions}

# Cloudflare R2 Object Storage (S3-compatible)
storage.r2.endpoint=${R2_ENDPOINT:https://f0df2e47e3a1620242cb32eb1e3bd328.r2.cloudflarestorage.com}
storage.r2.access-key=${R2_ACCESS_KEY:}
storage.r2.secret-key=${R2_SECRET_KEY:}
storage.r2.bucket=${R2_BUCKET:shelftotales}
storage.r2.public-url=${R2_PUBLIC_URL:}

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
