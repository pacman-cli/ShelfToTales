spring.application.name=shelfToTales
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shelftotalesdb}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:shelftotales}
spring.datasource.password=${DB_PASSWORD:shelftotales_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Server
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
server.forward-headers-strategy=framework

# Response Compression (gzip)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# JWT Configuration
jwt.secret-key=${JWT_SECRET_KEY:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# HTTPS (disable for local dev; enable in production via env var)
app.security.require-https=${REQUIRE_HTTPS:false}

# Swagger UI
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true

# Logging
logging.level.com.example.shelftotales=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.springframework.ai.vectorstore.pgvector.PgVectorStore=ERROR
logging.level.org.springframework.ai.ollama.OllamaEmbeddingModel=WARN
spring.jpa.open-in-view=false
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [req-%X{requestId}] - %msg%n

# Caching
# Local dev: CACHE_TYPE=simple (in-memory, default)
# Production: CACHE_TYPE=redis (JSON-serialized, per-cache TTLs)
#   books: 5min, bookById: 10min, categories: 1hr, profiles: 15min
spring.cache.type=${CACHE_TYPE:simple}
spring.cache.cache-names=categories,books,bookById,profiles

# Connection Pool Metrics
spring.datasource.hikari.register-mbeans=true

# Actuator: expose health, info, and metrics for monitoring.
# Health probes (liveness/readiness) are enabled for container orchestrators.
# Avoid exposing the env/heapdump/etc. endpoints in production.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.git.mode=simple

# Resilience4j Circuit Breaker for Google Auth
resilience4j.circuitbreaker.instances.google.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.google.slidingWindowSize=10
resilience4j.circuitbreaker.instances.google.failureRateThreshold=50
resilience4j.circuitbreaker.instances.google.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.google.permittedNumberOfCallsInHalfOpenState=3

# Resilience4j Time Limiter for Google Auth (5 second timeout)
resilience4j.timelimiter.instances.google.timeoutDuration=5s
resilience4j.timelimiter.instances.google.cancelRunningFuture=true

# Resilience4j Retry for Google Auth (3 attempts, 500ms wait, exponential backoff)
resilience4j.retry.instances.google.maxAttempts=3
resilience4j.retry.instances.google.waitDuration=500ms
resilience4j.retry.instances.google.enableExponentialBackoff=true
resilience4j.retry.instances.google.exponentialBackoffMultiplier=2

# Resilience4j Retry for Order Checkout (2 attempts for transient DB failures)
resilience4j.retry.instances.orderCheckout.maxAttempts=2
resilience4j.retry.instances.orderCheckout.waitDuration=200ms
resilience4j.retry.instances.orderCheckout.retryExceptions=org.springframework.dao.OptimisticLockingFailureException,org.springframework.dao.TransientDataAccessException

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID:908376284076-qp26p58bj59uatj3am37l9dk6sqm5bcb.apps.googleusercontent.com}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:shelftotales_redis_password}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# AI Embedding (local ONNX — run scripts/download-models.sh to fetch model)
ai.embedding.model-path=classpath:models/all-MiniLM-L6-v2.onnx
ai.embedding.tokenizer-path=classpath:models/tokenizer.json

# AI Chat (none = rule-based fallback, openrouter = OpenRouter free models, openai = OpenAI API)
ai.chat.provider=${AI_CHAT_PROVIDER:openrouter}
ai.chat.api-key=${AI_CHAT_API_KEY:}
ai.chat.model=${AI_CHAT_MODEL:meta-llama/llama-3.1-8b-instruct:free}
ai.chat.base-url=${AI_CHAT_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
ai.chat.timeout-ms=${AI_CHAT_TIMEOUT_MS:5000}
# OpenRouter ranking/identity headers (recommended by OpenRouter for free-tier apps)
ai.chat.openrouter.referer=${AI_CHAT_OPENROUTER_REFERER:https://shelftotales.com}
ai.chat.openrouter.title=${AI_CHAT_OPENROUTER_TITLE:ShelfToTales}

# AI Spoiler Classification
# Options: heuristic, llm, book-llm
# - heuristic: regex-based (always available)
# - llm: generic OpenRouter LLM
# - book-llm: per-book fine-tuned Ollama model (auto-falls back to llm/heuristic)
ai.spoiler.provider=${AI_SPOILER_PROVIDER:heuristic}
ai.spoiler.min-training-reviews=${AI_SPOILER_MIN_TRAINING_REVIEWS:3}

# Transformer-based spoiler classifier (ONNX + DistilBERT)
# Set ai.spoiler.transformer.enabled=true to enable the transformer tier
ai.spoiler.transformer.enabled=true
ai.spoiler.transformer.model-path=classpath:models/spoiler-detector.onnx
ai.spoiler.transformer.tokenizer-path=classpath:models/tokenizer.json

# Book-specific spoiler model training
ai.spoiler.training-dir=${AI_SPOILER_TRAINING_DIR:./training-data}
ai.spoiler.colab.enabled=${AI_SPOILER_COLAB_ENABLED:false}
ai.spoiler.colab.webhook-url=${AI_SPOILER_COLAB_WEBHOOK_URL:}
ai.spoiler.colab.drive-folder=${AI_SPOILER_COLAB_DRIVE_FOLDER:shelftotales-training}

# AI Spam Detection (llm = OpenRouter/LLM-based, none = disabled)
ai.spam.provider=${AI_SPAM_PROVIDER:llm}

# Cloudflare R2 Object Storage (S3-compatible)
storage.r2.endpoint=${R2_ENDPOINT:https://f0df2e47e3a1620242cb32eb1e3bd328.r2.cloudflarestorage.com}
storage.r2.access-key=${R2_ACCESS_KEY:391928c467ecc584f9df8b6a72d86949}
storage.r2.secret-key=${R2_SECRET_KEY:ede129eb4da6f1d844594fca4661b30057a980d78632ed2e5ff275a876df799b}
storage.r2.bucket=${R2_BUCKET:shelftotales}
storage.r2.public-url=${R2_PUBLIC_URL:https://pub-415a0fc5596740cb8ca6f0a6f4502efe.r2.dev}

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Spring AI: Ollama configuration for local LLM inference
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.model=shelf-spoiler-detector
spring.ai.ollama.temperature=0.1
spring.ai.ollama.num-predict=200

# Spring AI: PgVector store configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
