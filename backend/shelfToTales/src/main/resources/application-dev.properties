# Dev profile — verbose SQL and security logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.example.shelftotales=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [req-%X{requestId}] - %msg%n

# Dev defaults for security keys (to allow local execution without env vars)
jwt.secret-key=dev-only-secret-key-change-in-production-must-be-at-least-32-bytes
google.oauth.client-id=908376284076-qp26p58bj59uatj3am37l9dk6sqm5bcb.apps.googleusercontent.com

# Enable Swagger in development
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Verbose error messages in development
server.error.include-message=always
server.error.include-binding-errors=always
